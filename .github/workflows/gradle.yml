name: Build Mod

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: ./gradlew build

      - name: Rename JAR with commit SHA
        run: |
          mkdir -p output
          cp build/libs/*.jar output/mod-${{ github.run_number }}-${{ github.sha }}.jar

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: doggo-mod-build
          path: output/*.jar
